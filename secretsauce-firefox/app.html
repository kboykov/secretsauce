<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecretSauce</title>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-logo" width="36" height="36" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="url(#lg)"/>
        <text x="16" y="21.5" text-anchor="middle" font-size="15" font-weight="900"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" fill="white"
              letter-spacing="-0.5">SS</text>
        <defs>
          <linearGradient id="lg" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="brand-text">
        <div class="brand-name">SecretSauce</div>
      </div>
    </div>

    <div class="url-block">
      <div class="url-label">Scanning</div>
      <div class="url-val" id="page-url">—</div>
    </div>

    <div class="stats-block">
      <div class="stat-item">
        <div class="stat-n" id="count-endpoints">0</div>
        <div class="stat-l">endpoints</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-n" id="count-secrets">0</div>
        <div class="stat-l">secrets</div>
      </div>
    </div>

    <div class="scan-row">
      <span class="spinner hidden" id="spinner"></span>
      <span id="status-text">Scanning…</span>
    </div>

    <nav class="nav">
      <button class="nav-btn active" data-tab="endpoints">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M7.5 4.5v6M4.5 7.5h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>Endpoints</span>
        <span class="nav-badge" id="tab-badge-endpoints">0</span>
      </button>
      <button class="nav-btn" data-tab="secrets">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="3" y="7" width="9" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 7V5.5a2.5 2.5 0 0 1 5 0V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>Secrets</span>
        <span class="nav-badge alert" id="tab-badge-secrets">0</span>
      </button>
    </nav>

    <div class="sidebar-actions">
      <button class="action-btn" id="btn-rescan" title="Rescan page">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M12 7A5 5 0 1 1 7 2c1.3 0 2.5.5 3.4 1.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M10 1v3.5H13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Rescan
      </button>
      <button class="action-btn" id="btn-export" title="Export JSON">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8.5M4 7l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Export JSON
      </button>
    </div>

    <div class="sidebar-footer">
      <span id="footer-last-scan">—</span>
      <span id="footer-log-stats">Log: 0 endpoints / 0 secrets across 0 pages</span>
    </div>
  </aside>

  <!-- ── Main content ─────────────────────────────────────────────────── -->
  <main class="main">

    <!-- Endpoints panel -->
    <div class="panel active" id="tab-endpoints">
      <div class="panel-toolbar">
        <div class="search-box">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 9l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <input id="ep-search" class="s-input" type="text" placeholder="Filter endpoints…"/>
        </div>
        <select id="ep-filter-method" class="sel">
          <option value="">All methods</option>
          <option>GET</option><option>POST</option><option>PUT</option>
          <option>DELETE</option><option>PATCH</option>
        </select>
        <button id="btn-expand-endpoints" class="panel-btn" type="button">Expand all</button>
      </div>
      <div class="list" id="ep-list">
        <div class="empty" id="ep-empty">
          <div class="empty-icon">&#128269;</div>
          <div class="empty-title">No endpoints found yet</div>
          <div class="empty-sub">Scanning page and scripts…</div>
        </div>
      </div>
    </div>

    <!-- Secrets panel -->
    <div class="panel" id="tab-secrets">
      <div class="panel-toolbar">
        <div class="search-box">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 9l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <input id="sec-search" class="s-input" type="text" placeholder="Filter secrets…"/>
        </div>
        <select id="sec-filter-sev" class="sel">
          <option value="">All severities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button id="btn-expand-secrets" class="panel-btn" type="button">Expand all</button>
      </div>
      <div class="list" id="sec-list">
        <div class="empty" id="sec-empty">
          <div class="empty-icon">&#127881;</div>
          <div class="empty-title">No secrets found yet</div>
          <div class="empty-sub">Scanning in progress…</div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
